services:
  robot-api:
    image: ghcr.io/francescodelduchetto/cmp9134_2526_robotsim:latest
    container_name: gcs-robot-api
    restart: unless-stopped
    ports:
      - "5001:5000"

  backend:
    build:
      context: ./backend
    container_name: dennis-gcs-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      MONGO_URI: ""
      JWT_SECRET: "dennis_super_secret_key"
      ROBOT_API_BASE_URL: "http://robot-api:5000"
    depends_on:
      - robot-api

  frontend:
    build:
      context: ./frontend
    container_name: dennis-gcs-frontend
    restart: unless-stopped
    ports:
      - "2000:2000"
    environment:
      VITE_API_BASE_URL: "http://localhost:3000"
      VITE_ROBOT_API_BASE_URL: "http://robot-api:5000"
      VITE_TELEMETRY_WS_URL: "ws://localhost:5001"
    depends_on:
      - backend
